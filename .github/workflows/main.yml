name: CI/CD Pipeline

on:
  push:


jobs:
  check:
    name: Check Project
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [typecheck, test]
    env:
      DEBUG: 1
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      SQL_HOST: localhost
      SQL_PORT: 5432
      EDELYA_BOT_TOKEN: '9999999999:AAAAAAAAAAAAAAAAAAAAA'
    outputs:
      actions_url: ${{ steps.set-action-url.outputs.actions_url }}

    services:
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password

    steps:
      - name: Set Actions URL
        id: set-action-url
        run: echo "actions_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          make dev-install
          make static

      - name: Create necessary directories
        if: matrix.task == 'test'
        run: mkdir -p /home/runner/work/gamedi/gamedi/gamedi/media

      - name: Run matrix task
        run: |
          if [ "${{ matrix.task }}" = "typecheck" ]; then
            make check
          else
            make test
          fi

  tests_failure:
    name: Tests failure
    runs-on: ubuntu-latest
    needs: check
    if: failure()

    steps:
      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Tests were failed for commit: ${{ github.sha }}.
            Details: ${{ needs.check.outputs.actions_url }}

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/dev') || startsWith(github.ref, 'refs/tags/v')
    env:
      APP_NAME: gamedi
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.corpdi.ru
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.corpdi.ru/${{ env.APP_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-result:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      - check
      - build
    env:
      APP_NAME: gamedi
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            App: ${{ env.APP_NAME }}
            ${{ job.status == 'success' && '✅ Build was successful' || '❌ Build failed' }} for commit: ${{ github.sha }}.
            Details: ${{ needs.check.outputs.actions_url }}
            Build tag: ${{ github.ref_name }}
            Build status: ${{ job.status }}

            Committer: ${{ github.actor }}
            Commit: ${{ github.event.head_commit.message }}
            Branch: ${{ github.ref_name }}
